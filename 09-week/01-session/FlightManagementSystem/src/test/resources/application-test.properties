# Test Configuration
spring.application.name=FlightManagementSystem-Test

# H2 Database for Unit Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration
logging.level.org.springframework.test=DEBUG
logging.level.org.testcontainers=DEBUG
logging.level.com.SENA.FlightManagementSystem=DEBUG

# TestContainers Configuration
testcontainers.reuse.enable=true

# Disable security for tests
spring.security.user.name=test
spring.security.user.password=test
spring.security.user.roles=USER

# Disable actuator security for tests
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
